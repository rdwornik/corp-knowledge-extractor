# ======================
# GEMINI API SETTINGS (new pipeline)
# ======================

gemini:
  model: "gemini-2.5-flash"
  api_key_env: "GEMINI_API_KEY"
  max_file_size_mb: 2000
  upload_timeout_sec: 300
  generation_timeout_sec: 120
  polling_interval_sec: 5

# ======================
# VIDEO COMPRESSION (new pipeline)
# ======================

compression:
  enabled: true
  resolution: "1280:720"
  preset: "ultrafast"
  crf: 28
  audio_bitrate: "64k"
  skip_if_under_mb: 50

# ======================
# SUPPORTED FILE TYPES (new pipeline)
# ======================

file_types:
  video: [".mkv", ".mp4", ".webm", ".avi", ".mov", ".wmv"]
  audio: [".mp3", ".wav", ".m4a", ".ogg", ".flac"]
  document: [".pdf", ".docx"]
  slides: [".pptx"]
  spreadsheet: [".xlsx", ".csv"]
  note: [".md", ".txt"]
  transcript: [".srt", ".vtt"]

# ======================
# LLM PROMPTS (new pipeline)
# ======================

prompts:
  extract: |
    You are a knowledge extraction system for corporate meeting recordings.
    Analyze this file thoroughly and extract structured knowledge.

    Extract the following information and respond with valid JSON only (no markdown fences):
    {
      "title": "Descriptive title for this content",
      "summary": "2-3 sentence summary of the main content",
      "key_points": ["point 1", "point 2", "..."],
      "topics": ["topic1", "topic2"],
      "people": ["person names mentioned"],
      "products": ["product/system names mentioned"],
      "content_type": "training|meeting|demo|presentation|discussion",
      "language": "en",
      "quality": "high|medium|low",
      "duration_min": null,
      "transcript_excerpt": "First 200 chars of transcript or key spoken content"
    }

    Focus on capturing what was EXPLAINED and DISCUSSED, not just what is visible.
    Extract concrete details, technical specifics, and insights.

  extract_with_frames: |
    You are analyzing a corporate video recording that contains a presentation.
    You receive the full video AND extracted slide frames (screenshots of distinct slides).

    For the overall video, provide:
    - title, summary, topics, people, products, content_type, language, quality, duration_min, transcript_excerpt

    For EACH provided frame/slide image (in the order they appear), provide a slide analysis:
    - slide_number: sequential number matching the order the frames were provided
    - slide_title: title visible on the slide (empty string if no title)
    - slide_content: text/diagrams shown on the slide (describe what is visible)
    - speaker_explanation: what the speaker SAID about this slide (from audio — NOT from slide text)
    - key_points: 2-4 important takeaways from this slide
    - timestamp_approx: approximate timestamp in the video (format: "MM:SS")

    Focus on capturing what the speaker EXPLAINED, not just what is on the slide.
    Extract concrete details, technical specifics, and insider knowledge.

    Respond ONLY with valid JSON (no markdown fences):
    {
      "title": "...",
      "summary": "...",
      "key_points": ["..."],
      "topics": ["..."],
      "people": ["..."],
      "products": ["..."],
      "content_type": "training|meeting|demo|presentation|discussion",
      "language": "en",
      "quality": "high|medium|low",
      "duration_min": null,
      "transcript_excerpt": "...",
      "slides": [
        {
          "slide_number": 1,
          "slide_title": "...",
          "slide_content": "...",
          "speaker_explanation": "...",
          "key_points": ["..."],
          "timestamp_approx": "MM:SS"
        }
      ]
    }

  synthesize: |
    You are synthesizing knowledge from multiple related files into a unified overview.
    Review the extracted knowledge from each file and create a combined synthesis.

    Respond with valid JSON only (no markdown fences):
    {
      "title": "Overall session/meeting title",
      "executive_summary": "3-5 sentence executive summary",
      "key_takeaways": ["takeaway 1", "takeaway 2", "..."],
      "all_topics": ["comprehensive topic list"],
      "all_people": ["all people mentioned"],
      "all_products": ["all products/systems mentioned"],
      "relationships": "How the files relate to each other",
      "action_items": ["any action items mentioned"],
      "open_questions": ["unresolved questions or topics needing follow-up"]
    }

# ======================
# GENERAL SETTINGS
# ======================

# Input paths and file extensions
input:
  directory: "data/input"
  video_extensions: [".mp4", ".mkv", ".avi", ".mov"]

# Output directory
output:
  directory: "output"

# Paths to external tools
tools:
  tesseract_path: "C:\\Program Files\\Tesseract-OCR\\tesseract.exe"

# ======================
# LLM SETTINGS
# ======================

llm:
  # Primary model for synthesis
  model: "gemini-3-flash-preview"

  # Tagger model (can be different from synthesis model)
  tagger_model: "gemini-3-flash-preview"

  # Whisper model for transcription
  whisper_model: "medium"

# ======================
# TRANSCRIPTION SETTINGS
# ======================

transcription:
  # Provider selection
  # Options: "auto", "groq", "openai"
  # "auto" = intelligent selection based on file duration and cost
  provider: "auto"

  # Auto-selection thresholds
  auto_selection:
    # Maximum duration for Groq free tier (seconds)
    # Groq has 7200s/hour limit - use 6000s (1h 40min) as safe threshold
    groq_max_duration_seconds: 6000

    # Prefer free tier when possible
    prefer_free: true

    # Warn if file would require multiple Groq sessions
    warn_multiple_sessions: true

  # Groq settings (FREE TIER)
  groq:
    model: "whisper-large-v3"

    # Rate limit: 7200 seconds per hour
    rate_limit_seconds_per_hour: 7200

    # Maximum file size before preprocessing (MB)
    max_file_size_mb: 25

  # OpenAI settings (PAID)
  openai:
    model: "whisper-1"

    # Cost per minute of audio ($0.006/min as of 2025)
    cost_per_minute: 0.006

    # OpenAI also has 25MB limit - uses same chunking as Groq
    max_file_size_mb: 25

  # Retry settings for both providers
  retry:
    # Enable automatic retry on rate limit errors
    enabled: true

    # Maximum number of retries
    max_retries: 3

    # Backoff multiplier (wait time increases each retry)
    backoff_multiplier: 1.5

    # Initial retry delay (seconds)
    initial_delay: 60

  # Silence removal settings
  silence_removal:
    # Enable silence removal to reduce file size
    enabled: true

    # Silence threshold in dB (higher = more aggressive)
    # -40dB is good for meetings (removes pauses, keeps speech)
    # -30dB would be more aggressive, -50dB more conservative
    threshold_db: -40

    # Minimum silence duration to remove (seconds)
    # 2.0s removes long pauses between topics
    # 1.0s would remove shorter pauses
    min_silence_duration: 2.0

  # Audio chunking for large files (mainly for Groq)
  chunking:
    # Enable automatic chunking if file exceeds max_file_size_mb
    enabled: true

    # Maximum chunk size in MB (keep under 25MB for Groq)
    max_chunk_size_mb: 24

    # Overlap between chunks in seconds (preserves context at boundaries)
    # 5s ensures words at chunk boundaries aren't lost
    overlap_seconds: 5.0

# ======================
# CONTENT LIMITS
# ======================

limits:
  # Maximum OCR text length per frame sent to LLM
  ocr_text_max_chars: 500

  # Default speech range for last frame (seconds)
  speech_range_last_frame: 60

  # Minimum text length to be considered valuable
  min_valuable_text_length: 20

  # Minimum explanation length for post-processing
  min_explanation_length: 30

  # Minimum technical details length
  min_technical_details_length: 10
