# Overlay field templates for deep extraction prompt.
# Each key maps to a doc_type; the value is the JSON field template
# injected into the deep prompt's overlay section.

architecture: |
  "components": [{"name": "...", "description": "...", "role": "..."}],
  "integration_points": [{"system": "...", "method": "...", "protocol": "..."}],
  "data_flow": "description of data flow between components",
  "apis": [{"endpoint": "...", "purpose": "...", "auth_method": "..."}],
  "deployment_model": "single-tenant | multi-tenant | hybrid",
  "scalability": "scaling characteristics and limits",
  "tech_stack": ["technology1", "technology2"],
  "environments": "dev/staging/prod details"

product_doc: |
  "components": [{"name": "...", "description": "...", "role": "..."}],
